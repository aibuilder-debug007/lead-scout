<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaytrix — Lead Scout</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f1f5c 0%, #1a56db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrapper { width: 100%; max-width: 420px; padding: 24px; }
        .brand { text-align: center; margin-bottom: 32px; }
        .brand-logo { font-size: 36px; font-weight: 900; color: #fff; letter-spacing: -1px; }
        .brand-logo span { color: #60a5fa; }
        .brand-sub { color: #93c5fd; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
        }
        .card-title { font-size: 20px; font-weight: 700; color: #0f1f5c; margin-bottom: 6px; }
        .card-desc { font-size: 14px; color: #6b7280; margin-bottom: 28px; }
        label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #6b7280; margin-bottom: 8px; }
        input[type="password"] {
            width: 100%;
            background: #f8faff;
            border: 1.5px solid #dbeafe;
            color: #0f1f5c;
            padding: 13px 16px;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="password"]:focus { border-color: #1a56db; box-shadow: 0 0 0 4px #dbeafe; }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #1a56db, #2563eb);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.92; }
        .error {
            background: #fef2f2;
            border: 1.5px solid #fecaca;
            color: #dc2626;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer { text-align: center; margin-top: 24px; color: #93c5fd; font-size: 12px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="brand">
            <div class="brand-logo">Sway<span>trix</span></div>
            <div class="brand-sub">Lead Intelligence Platform</div>
        </div>
        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-desc">Enter your password to access the dashboard.</div>
            {% if error %}
            <div class="error">&#10007; Incorrect password. Please try again.</div>
            {% endif %}
            <form method="post" action="/login">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••••••" autofocus required>
                <button type="submit" class="btn">Access Dashboard</button>
            </form>
        </div>
        <div class="footer">© 2026 Swaytrix. All rights reserved.</div>
    </div>
</body>
</html>
